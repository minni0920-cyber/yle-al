<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劍橋英語守衛戰 - 最終修復</title>
    <style>
        /* 基礎樣式 */
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        #game-container { max-width: 850px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 戰鬥畫面 */
        #battle-stage { height: 240px; position: relative; background: linear-gradient(to bottom, #5d9cec, #48cfad); border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 4px solid #2c3e50; }
        .ground { position: absolute; bottom: 0; width: 100%; height: 40px; background: #70a1ff; }
        .fortress { position: absolute; left: 10px; bottom: 20px; font-size: 70px; z-index: 5; }
        .monster { position: absolute; right: 30px; bottom: 20px; font-size: 75px; transition: all 0.3s; z-index: 4; }
        .soldier { position: absolute; left: 85px; bottom: 35px; font-size: 50px; display: none; z-index: 6; transition: transform 0.6s ease-in; }
        
        /* 血條 */
        .hp-bar-outer { position: absolute; top: 15px; width: 180px; height: 22px; background: #fff; border-radius: 11px; border: 3px solid #2c3e50; overflow: hidden; }
        .hp-inner { height: 100%; width: 100%; transition: width 0.5s; }
        #f-hp-bar { left: 15px; } #m-hp-bar { right: 15px; }
        
        /* 選單與按鈕 */
        #start-area { padding: 40px 0; display: block; }
        .level-btn { padding: 25px 45px; font-size: 28px; margin: 15px; border-radius: 15px; cursor: pointer; border: none; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .starters { background: #3498db; box-shadow: 0 6px #2980b9; }
        .movers { background: #9b59b6; box-shadow: 0 6px #8e44ad; }
        
        /* 遊戲介面 */
        #spelling-zone { min-height: 60px; margin: 10px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .letter-slot { width: 40px; height: 50px; background: rgba(255,255,255,0.2); border-bottom: 3px solid white; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #letter-pool { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .pool-btn { padding: 10px 18px; font-size: 26px; background: #ecf0f1; color: #2c3e50; border-radius: 8px; cursor: pointer; border: none; box-shadow: 0 4px #bdc3c7; }
        .pool-btn.used { visibility: hidden; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .btn-opt { padding: 18px; font-size: 22px; cursor: pointer; border: none; border-radius: 12px; background: #f1c40f; color: #2c3e50; font-weight: bold; box-shadow: 0 6px #d35400; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="prog-info" style="color:#bdc3c7; margin-bottom:10px;">請選擇等級啟動遊戲</div>
    
    <div id="battle-stage">
        <div class="ground"></div>
        <div id="f-hp-bar" class="hp-bar-outer"><div id="f-fill" class="hp-inner" style="background: #2ecc71; width: 100%;"></div></div>
        <div id="m-hp-bar" class="hp-bar-outer"><div id="m-fill" class="hp-inner" style="background: #e74c3c; width: 100%;"></div></div>
        <div class="fortress">🏰</div><div id="soldier" class="soldier">⚔️</div><div id="monster" class="monster">👾</div>
    </div>

    <div id="quiz-area">
        <h2 id="question-text" style="font-size: 40px; margin: 15px;">劍橋英語守衛戰</h2>
        
        <div id="start-area">
            <button class="level-btn starters" onclick="startGame('starters')">Starters</button>
            <button class="level-btn movers" onclick="startGame('movers')">Movers</button>
        </div>

        <div id="spelling-ui" style="display:none;">
            <div id="spelling-zone"></div>
            <div id="letter-pool"></div>
        </div>
        <div id="choice-ui" style="display:none;">
            <div class="options-grid" id="options"></div>
        </div>
        <button id="voice-btn" onclick="playVoice()" style="display:none; background:#3498db; color:white; border:none; padding:12px 30px; border-radius:50px; margin: 20px auto; cursor:pointer;">🔊 重播發音</button>
    </div>
</div>

<div id="msg-screen" class="overlay">
    <h1 id="msg-title" style="color:#f1c40f; font-size:48px;"></h1>
    <p id="msg-body" style="font-size:24px; margin:20px;"></p>
    <button onclick="closeMsg()" id="msg-btn" style="padding:15px 50px; font-size:24px; border-radius:10px; cursor:pointer; background:#2ecc71; color:white; border:none;">確認</button>
</div>

<script>
    // 單字庫定義
    const startersDB = [
        {en:'cat', zh:'貓'}, {en:'apple', zh:'蘋果'}, {en:'elephant', zh:'大象'}, {en:'twelve', zh:'12'},
        {en:'purple', zh:'紫色'}, {en:'armchair', zh:'扶手椅'}, {en:'keyboard', zh:'鍵盤'}, {en:'spider', zh:'蜘蛛'}
    ];
    const moversDB = [
        {en:'crocodile', zh:'鱷魚'}, {en:'helicopter', zh:'直升機'}, {en:'kangaroo', zh:'袋鼠'}, {en:'dolphin', zh:'海豚'},
        {en:'toothbrush', zh:'牙刷'}, {en:'sweater', zh:'毛衣'}, {en:'library', zh:'圖書館'}, {en:'mountain', zh:'山'}
    ];

    let wordDB = [];
    let currentWord = null;
    let usedIndices = [];
    let fHP = 15;
    let mHP = 20;
    let guess = [];
    let isResetMode = false;

    // 將函數綁定到全域物件，防止「Not Defined」錯誤
    window.startGame = function(level) {
        wordDB = (level === 'starters') ? startersDB : moversDB;
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('voice-btn').style.display = 'block';
        fHP = 15; mHP = 20; usedIndices = [];
        updateUI();
        nextQuestion();
    };

    function nextQuestion() {
        if (usedIndices.length >= wordDB.length) {
            showMsg("榮耀勝利！", "完成挑戰！", "回選單", true);
            return;
        }
        let idx;
        do { idx = Math.floor(Math.random() * wordDB.length); } while (usedIndices.includes(idx));
        currentWord = wordDB[idx];
        
        // 隨機切換拼字或選擇模式
        if (Math.random() > 0.5) {
            setupChoice();
        } else {
            setupSpelling();
        }
        setTimeout(playVoice, 500);
    }

    function setupChoice() {
        document.getElementById('spelling-ui').style.display = 'none';
        document.getElementById('choice-ui').style.display = 'block';
        document.getElementById('question-text').innerText = currentWord.en;
        
        let opts = [currentWord.zh];
        while(opts.length < 4) {
            let r = wordDB[Math.floor(Math.random() * wordDB.length)].zh;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        
        const container = document.getElementById('options');
        container.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = o;
            b.onclick = () => (o === currentWord.zh) ? combat(2) : hurt(3);
            container.appendChild(b);
        });
    }

    function setupSpelling() {
        document.getElementById('choice-ui').style.display = 'none';
        document.getElementById('spelling-ui').style.display = 'block';
        document.getElementById('question-text').innerText = currentWord.zh;
        
        guess = [];
        const pool = document.getElementById('letter-pool');
        const zone = document.getElementById('spelling-zone');
        pool.innerHTML = ''; zone.innerHTML = '';
        
        const cleanWord = currentWord.en.replace(/\s/g, '').toLowerCase();
        for(let i=0; i<cleanWord.length; i++) {
            let slot = document.createElement('div');
            slot.className = 'letter-slot';
            slot.onclick = undo;
            zone.appendChild(slot);
        }
        
        let chars = cleanWord.split('').sort(() => Math.random() - 0.5);
        chars.forEach((c, i) => {
            let b = document.createElement('button');
            b.className = 'pool-btn'; b.innerText = c; b.id = 'l-' + i;
            b.onclick = () => {
                if(guess.length < cleanWord.length) {
                    b.classList.add('used');
                    guess.push({char: c, id: 'l-'+i});
                    updateSlots();
                    if(guess.length === cleanWord.length) {
                        if(guess.map(g => g.char).join('') === cleanWord) combat(4);
                        else { hurt(3); setTimeout(setupSpelling, 800); }
                    }
                }
            };
            pool.appendChild(b);
        });
    }

    function updateSlots() {
        const slots = document.querySelectorAll('.letter-slot');
        slots.forEach((s, i) => s.innerText = guess[i] ? guess[i].char : "");
    }

    function undo() {
        if(guess.length === 0) return;
        let last = guess.pop();
        document.getElementById(last.id).classList.remove('used');
        updateSlots();
    }

    function combat(dmg) {
        usedIndices.push(wordDB.indexOf(currentWord));
        mHP -= dmg;
        const s = document.getElementById('soldier');
        s.style.display = 'block';
        s.style.transform = 'translateX(500px)';
        setTimeout(() => {
            s.style.display = 'none'; s.style.transform = 'translateX(0)';
            updateUI();
            if (mHP <= 0) showMsg("擊潰怪獸！", "怪物撤退了！", "下一波", false);
            else nextQuestion();
        }, 600);
    }

    function hurt(dmg) {
        fHP -= dmg;
        const m = document.getElementById('monster');
        m.style.transform = 'translateX(-450px)';
        setTimeout(() => {
            m.style.transform = 'translateX(0)';
            updateUI();
            if (fHP <= 0) showMsg("防線崩潰", "再練習一下吧！", "重新開始", true);
        }, 400);
    }

    function updateUI() {
        document.getElementById('f-fill').style.width = (fHP/15*100) + "%";
        document.getElementById('m-fill').style.width = (mHP/20*100) + "%";
        document.getElementById('prog-info').innerText = "進度：" + usedIndices.length + " / " + wordDB.length;
    }

    window.playVoice = function() {
        if (!currentWord) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentWord.en);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function showMsg(t, b, btn, r) {
        isResetMode = r;
        document.getElementById('msg-title').innerText = t;
        document.getElementById('msg-body').innerText = b;
        document.getElementById('msg-btn').innerText = btn;
        document.getElementById('msg-screen').style.display = 'flex';
    }

    window.closeMsg = function() {
        if(isResetMode) location.reload();
        else {
            mHP = 20; updateUI();
            document.getElementById('msg-screen').style.display = 'none';
            nextQuestion();
        }
    }
</script>
</body>
</html>
